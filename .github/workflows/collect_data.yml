name: Collect Matchup Data

on:
  schedule:
    # All times UTC (EST + 5hrs)
    #
    # GAME WINDOWS - every 30 min:
    #   Sat  12:00pm-1:00am EST = 17:00-06:00 UTC (Sun morning)
    - cron: '0,30 17-23 * * 6'    # Sat 17:00-23:30 UTC
    - cron: '0,30 0-6  * * 0'     # Sat night into Sun 00:00-06:00 UTC
    #   Sun  12:30pm-12:30am EST = 17:30-05:30 UTC (Mon morning)
    - cron: '0,30 17-23 * * 0'    # Sun 17:00-23:30 UTC
    - cron: '0,30 0-5  * * 1'     # Sun night into Mon 00:00-05:30 UTC
    #   Mon-Fri  6:30pm-1:30am EST = 23:30-06:30 UTC (next day)
    - cron: '0,30 23   * * 1-5'   # Mon-Fri 23:00-23:30 UTC
    - cron: '0,30 0-6  * * 2-6'   # Tue-Sat 00:00-06:30 UTC (overnight after Mon-Fri games)
    #
    # OFF-PEAK - every 2 hours (covers all other times)
    - cron: '0 */2 * * *'
    #
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Need full history so we can commit the updated CSV back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file from secrets
        run: |
          cat > .env << EOF
          YAHOO_CONSUMER_KEY=${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET=${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_ACCESS_TOKEN=${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN=${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME=${{ secrets.YAHOO_TOKEN_TIME }}
          YAHOO_TOKEN_TYPE=bearer
          YAHOO_GUID=None
          EOF

      - name: Collect matchup data
        run: python collect_matchup_data.py
        env:
          DATA_FILE: matchup_data.csv

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matchup_data.csv
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: collect matchup data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
