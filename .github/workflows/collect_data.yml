name: Collect Matchup Data

on:
  workflow_dispatch:  # Triggered externally by cron-job.org every 30 minutes

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file from secrets
        run: |
          cat > .env << EOF
          YAHOO_CONSUMER_KEY=${{ secrets.YAHOO_CONSUMER_KEY }}
          YAHOO_CONSUMER_SECRET=${{ secrets.YAHOO_CONSUMER_SECRET }}
          YAHOO_ACCESS_TOKEN=${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN=${{ secrets.YAHOO_REFRESH_TOKEN }}
          YAHOO_TOKEN_TIME=${{ secrets.YAHOO_TOKEN_TIME }}
          YAHOO_TOKEN_TYPE=bearer
          YAHOO_GUID=None
          EOF

      - name: Collect matchup data
        run: python collect_matchup_data.py
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
